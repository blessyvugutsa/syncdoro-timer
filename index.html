<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncDoro - Group Pomodoro Timer</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-accent: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --color-pomodoro: #ef4444;
            --color-break: #10b981;
            --color-link: #3b82f6;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-primary);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Sidebar - Group & Chat */
        .sidebar {
            width: 320px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--bg-accent);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .room-info {
            padding: 20px;
            border-bottom: 1px solid var(--bg-accent);
        }

        .room-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .room-id {
            font-family: monospace;
            color: var(--color-link);
            font-size: 0.85rem;
            background: var(--bg-primary);
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .section-panel {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 700;
        }

        .user-list {
            list-style: none;
            margin-bottom: 24px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 0.95rem;
        }

        .user-status {
            width: 8px;
            height: 8px;
            background-color: var(--color-break);
            border-radius: 50%;
        }

        .user-status.studying {
            background-color: var(--color-pomodoro);
        }

        /* Chat Panel Box */
        .chat-box {
            flex: 1;
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid var(--bg-accent);
        }

        .chat-messages {
            overflow-y: auto;
            flex: 1;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .chat-msg {
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .chat-user {
            font-weight: 600;
            color: var(--text-muted);
        }

        .chat-input {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--bg-accent);
            padding: 8px 12px;
            border-radius: 6px;
            color: var(--text-main);
            outline: none;
        }

        /* Main Content Dashboard Area */
        .main-dashboard {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px;
        }

        /* Phase Badges */
        .phase-control {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            background: var(--bg-secondary);
            padding: 6px;
            border-radius: 30px;
        }

        .phase-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .phase-btn.active.pomodoro {
            background: var(--color-pomodoro);
            color: white;
        }

        /* Interactive Giant Timer Graphic */
        .timer-container {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .timer-svg {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .timer-circle-bg {
            fill: none;
            stroke: var(--bg-secondary);
            stroke-width: 8;
        }

        .timer-circle-progress {
            fill: none;
            stroke: var(--color-pomodoro);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-digits {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            z-index: 10;
        }

        /* Control Buttons */
        .controls {
            display: flex;
            gap: 16px;
        }

        .btn {
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background-color: var(--text-main);
            color: var(--bg-primary);
        }

        .btn-secondary {
            background-color: var(--bg-secondary);
            color: var(--text-main);
            border: 1px solid var(--bg-accent);
        }

        .btn-primary:hover, .btn-secondary:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="room-info">
            <h1 class="room-title">Algorithms Study Group</h1>
            <span class="room-id">Room ID: 4f7a-bc82</span>
        </div>
        
        <div class="section-panel">
            <h2 class="section-title">Members Online (3)</h2>
            <ul class="user-list">
                <li class="user-item">
                    <span class="user-status studying"></span>
                    <span>Alex (You)</span>
                </li>
                <li class="user-item">
                    <span class="user-status studying"></span>
                    <span>David</span>
                </li>
                <li class="user-item">
                    <span class="user-status"></span>
                    <span>Maria</span>
                </li>
            </ul>

            <h2 class="section-title">Session Chat</h2>
            <div class="chat-box">
                <div class="chat-messages">
                    <div class="chat-msg">
                        <span class="chat-user">David:</span> Let's lock in for this 25 mins session.
                    </div>
                    <div class="chat-msg">
                        <span class="chat-user">Maria:</span> Ready! Finishing my coffee now.
                    </div>
                </div>
                <input type="text" class="chat-input" placeholder="Message group...">
            </div>
        </div>
    </aside>

    <main class="main-dashboard">
        
        <div class="phase-control">
            <button class="phase-btn active pomodoro">Pomodoro</button>
            <button class="phase-btn">Short Break</button>
            <button class="phase-btn">Long Break</button>
        </div>

        <div class="timer-container">
            <svg class="timer-svg" viewBox="0 0 100 100">
                <circle class="timer-circle-bg" cx="50" cy="50" r="45"/>
                <circle class="timer-circle-progress" cx="50" cy="50" r="45" 
                        stroke-dasharray="283" stroke-dashoffset="0"/>
            </svg>
            <div class="timer-digits">25:00</div>
        </div>

        <div class="controls">
            <button class="btn btn-primary">Start Session</button>
            <button class="btn btn-secondary">Reset</button>
        </div>

    </main>

    <script>
        const timerDigits = document.querySelector('.timer-digits');
        const startBtn = document.querySelector('.btn-primary');
        const resetBtn = document.querySelector('.btn-secondary');
        const progressCircle = document.querySelector('.timer-circle-progress');

        let countdown;
        let isRunning = false;
        
        const totalTime = 25 * 60; // 25 minutes in seconds
        let timeLeft = totalTime;

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            
            timerDigits.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

            // Calculate SVG Ring layout offset
            const fraction = timeLeft / totalTime;
            const offset = 283 * (1 - fraction);
            progressCircle.style.strokeDashoffset = offset;
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(countdown);
                startBtn.textContent = 'Start Session';
                isRunning = false;
            } else {
                startBtn.textContent = 'Pause';
                isRunning = true;
                
                countdown = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(countdown);
                        alert("Time's up! Time for a quick break.");
                        resetTimer();
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(countdown);
            timeLeft = totalTime;
            isRunning = false;
            startBtn.textContent = 'Start Session';
            updateDisplay();
        }

        startBtn.addEventListener('click', toggleTimer);
        resetBtn.addEventListener('click', resetTimer);

        // Initialize display state
        updateDisplay();
    </script>

</body>
</html>
