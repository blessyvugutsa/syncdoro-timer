<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncDoro - Group Pomodoro Timer</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-accent: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --color-pomodoro: #ef4444;
            --color-break: #10b981;
            --color-link: #3b82f6;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-primary);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* --- JOIN ROOM MODAL OVERLAY --- */
        .join-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        /* Hides the login screen once joined */
        .join-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .join-card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--bg-accent);
            padding: 40px;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .join-card h2 {
            margin-bottom: 8px;
            font-size: 1.8rem;
        }

        .join-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        .form-input {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--bg-accent);
            padding: 12px 16px;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: var(--color-link);
        }

        .btn-block {
            width: 100%;
            padding: 14px;
            background-color: var(--color-pomodoro);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-block:hover {
            background-color: #dc2626;
        }

        /* --- SIDEBAR & DASHBOARD LAYOUT --- */
        .sidebar {
            width: 320px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--bg-accent);
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .room-info {
            padding: 20px;
            border-bottom: 1px solid var(--bg-accent);
        }

        .room-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .room-id {
            font-family: monospace;
            color: var(--color-link);
            font-size: 0.85rem;
            background: var(--bg-primary);
            padding: 4px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .section-panel {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .section-title {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 700;
        }

        .user-list {
            list-style: none;
            margin-bottom: 24px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 0.95rem;
        }

        .user-status {
            width: 8px;
            height: 8px;
            background-color: var(--color-break);
            border-radius: 50%;
        }

        .user-status.studying {
            background-color: var(--color-pomodoro);
        }

        .chat-box {
            flex: 1;
            background: var(--bg-primary);
            border-radius: 8px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid var(--bg-accent);
        }

        .chat-messages {
            overflow-y: auto;
            flex: 1;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .chat-msg {
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .chat-user {
            font-weight: 600;
            color: var(--text-muted);
        }

        .chat-input {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--bg-accent);
            padding: 8px 12px;
            border-radius: 6px;
            color: var(--text-main);
            outline: none;
        }

        .main-dashboard {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 40px;
        }

        .phase-control {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            background: var(--bg-secondary);
            padding: 6px;
            border-radius: 30px;
        }

        .phase-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .phase-btn.active.pomodoro {
            background: var(--color-pomodoro);
            color: white;
        }

        .timer-container {
            position: relative;
            width: 320px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 40px;
        }

        .timer-svg {
            position: absolute;
            top: 0;
            left: 0;
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .timer-circle-bg {
            fill: none;
            stroke: var(--bg-secondary);
            stroke-width: 8;
        }

        .timer-circle-progress {
            fill: none;
            stroke: var(--color-pomodoro);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-digits {
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            z-index: 10;
        }

        .controls {
            display: flex;
            gap: 16px;
        }

        .btn {
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background-color: var(--text-main);
            color: var(--bg-primary);
        }

        .btn-secondary {
            background-color: var(--bg-secondary);
            color: var(--text-main);
            border: 1px solid var(--bg-accent);
        }
    </style>
</head>
<body>

    <div class="join-overlay" id="joinOverlay">
        <div class="join-card">
            <h2>Join Study Room</h2>
            <p>Enter your details to enter the synchronous session.</p>
            
            <div class="input-group">
                <label for="username">Your Name</label>
                <input type="text" id="username" class="form-input" placeholder="e.g., Blessy" required>
            </div>
            
            <div class="input-group">
                <label for="passcode">Room Passcode</label>
                <input type="password" id="passcode" class="form-input" placeholder="Enter room passcode" required>
            </div>
            
            <button class="btn-block" id="joinBtn">Join Session</button>
        </div>
    </div>

    <aside class="sidebar">
        <div class="room-info">
            <h1 class="room-title">Algorithms Study Group</h1>
            <span class="room-id">Room ID: 4f7a-bc82</span>
        </div>
        
        <div class="section-panel">
            <h2 class="section-title">Members Online</h2>
            <ul class="user-list" id="membersList">
                <li class="user-item">
                    <span class="user-status studying"></span>
                    <span id="currentUserLabel">You</span>
                </li>
                <li class="user-item">
                    <span class="user-status studying"></span>
                    <span>David</span>
                </li>
                <li class="user-item">
                    <span class="user-status"></span>
                    <span>Maria</span>
                </li>
            </ul>

            <h2 class="section-title">Session Chat</h2>
            <div class="chat-box">
                <div class="chat-messages">
                    <div class="chat-msg">
                        <span class="chat-user">David:</span> Let's lock in for this 25 mins session.
                    </div>
                </div>
                <input type="text" class="chat-input" placeholder="Message group...">
            </div>
        </div>
    </aside>

    <main class="main-dashboard">
        <div class="phase-control">
            <button class="phase-btn active pomodoro">Pomodoro</button>
            <button class="phase-btn">Short Break</button>
            <button class="phase-btn">Long Break</button>
        </div>

        <div class="timer-container">
            <svg class="timer-svg" viewBox="0 0 100 100">
                <circle class="timer-circle-bg" cx="50" cy="50" r="45"/>
                <circle class="timer-circle-progress" cx="50" cy="50" r="45" 
                        stroke-dasharray="283" stroke-dashoffset="0"/>
            </svg>
            <div class="timer-digits">25:00</div>
        </div>

        <div class="controls">
            <button class="btn btn-primary">Start Session</button>
            <button class="btn btn-secondary">Reset</button>
        </div>
    </main>

    <script>
        // Set your secret passcode here
        const CORRECT_PASSCODE = "12345"; 

        // DOM elements for Join Screen
        const joinOverlay = document.getElementById('joinOverlay');
        const usernameInput = document.getElementById('username');
        const passcodeInput = document.getElementById('passcode');
        const joinBtn = document.getElementById('joinBtn');
        const currentUserLabel = document.getElementById('currentUserLabel');

        // DOM elements for Timer Dashboard
        const timerDigits = document.querySelector('.timer-digits');
        const startBtn = document.querySelector('.btn-primary');
        const resetBtn = document.querySelector('.btn-secondary');
        const progressCircle = document.querySelector('.timer-circle-progress');

        // Handling Form submission
        joinBtn.addEventListener('click', () => {
            const name = usernameInput.value.trim();
            const code = passcodeInput.value.trim();

            if (!name) {
                alert("Please enter your name.");
                return;
            }

            if (code !== CORRECT_PASSCODE) {
                alert("Incorrect Room Passcode! Please try again.");
                return;
            }

            // If passcode matches, customize the placeholder name in the sidebar and hide overlay
            currentUserLabel.textContent = `${name} (You)`;
            joinOverlay.classList.add('hidden');
        });

        // --- TIMER CORE ACTION LOGIC ---
        let countdown;
        let isRunning = false;
        const totalTime = 25 * 60; 
        let timeLeft = totalTime;

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDigits.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            const fraction = timeLeft / totalTime;
            const offset = 283 * (1 - fraction);
            progressCircle.style.strokeDashoffset = offset;
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(countdown);
                startBtn.textContent = 'Start Session';
                isRunning = false;
            } else {
                startBtn.textContent = 'Pause';
                isRunning = true;
                countdown = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                    } else {
                        clearInterval(countdown);
                        alert("Time's up!");
                        resetTimer();
                    }
                }, 1000);
            }
        }

        function resetTimer() {
            clearInterval(countdown);
            timeLeft = totalTime;
            isRunning = false;
            startBtn.textContent = 'Start Session';
            updateDisplay();
        }

        startBtn.addEventListener('click', toggleTimer);
        resetBtn.addEventListener('click', resetTimer);
        updateDisplay();
    </script>
</body>
</html>
